<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c0c0e"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4a9eff"/>
      <stop offset="100%" stop-color="#1e5fa0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c17f4e"/>
      <stop offset="100%" stop-color="#d49a6a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#f4f4f5" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="300"/><line x1="40" y1="0" x2="40" y2="300"/>
    <line x1="80" y1="0" x2="80" y2="300"/><line x1="120" y1="0" x2="120" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="300"/><line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/><line x1="280" y1="0" x2="280" y2="300"/>
    <line x1="320" y1="0" x2="320" y2="300"/><line x1="360" y1="0" x2="360" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="0" y1="0" x2="400" y2="0"/><line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="80" x2="400" y2="80"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="160" x2="400" y2="160"/><line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="240" x2="400" y2="240"/><line x1="0" y1="280" x2="400" y2="280"/>
  </g>

  <!-- Water wave effect bottom -->
  <path d="M0 240 Q50 220 100 240 T200 240 T300 240 T400 240 V300 H0 Z" fill="url(#water)" opacity="0.15"/>
  <path d="M0 255 Q50 240 100 255 T200 255 T300 255 T400 255 V300 H0 Z" fill="url(#water)" opacity="0.1"/>

  <!-- Chat bubble left (user) -->
  <g transform="translate(30, 60)">
    <rect width="140" height="50" rx="12" fill="#1d1d22" stroke="#2a2a30" stroke-width="1"/>
    <text x="16" y="22" font-family="Space Grotesk, monospace" font-size="10" fill="#6b6b73">user@chat:</text>
    <text x="16" y="38" font-family="Space Grotesk, monospace" font-size="11" fill="#f4f4f5">Hey Giyu!</text>
  </g>

  <!-- Chat bubble right (Giyu AI) -->
  <g transform="translate(200, 120)">
    <rect width="170" height="65" rx="12" fill="#0f1923" stroke="#1e5fa0" stroke-width="1"/>
    <text x="16" y="20" font-family="Space Grotesk, monospace" font-size="9" fill="#4a9eff">giyu-ai@water:</text>
    <text x="16" y="36" font-family="Space Grotesk, monospace" font-size="11" fill="#f4f4f5">*sends Giyu sticker*</text>
    <text x="16" y="52" font-family="Space Grotesk, monospace" font-size="10" fill="#6b6b73">[emotion: calm]</text>
  </g>

  <!-- Sword icon (Water Hashira) -->
  <g transform="translate(170, 140) rotate(45)">
    <rect x="0" y="0" width="4" height="60" rx="2" fill="url(#accent)"/>
    <rect x="-6" y="56" width="16" height="4" rx="2" fill="url(#accent)"/>
    <circle cx="2" cy="64" r="3" fill="url(#accent)" opacity="0.6"/>
  </g>

  <!-- Sticker emojis floating -->
  <g opacity="0.8">
    <circle cx="80" cy="180" r="18" fill="#1d1d22" stroke="#2a2a30" stroke-width="1"/>
    <text x="80" y="186" text-anchor="middle" font-size="20">&#x1F4A8;</text>

    <circle cx="320" cy="80" r="16" fill="#1d1d22" stroke="#2a2a30" stroke-width="1"/>
    <text x="320" y="86" text-anchor="middle" font-size="18">&#x1F30A;</text>

    <circle cx="340" cy="200" r="14" fill="#1d1d22" stroke="#2a2a30" stroke-width="1"/>
    <text x="340" y="205" text-anchor="middle" font-size="16">&#x2694;</text>
  </g>

  <!-- Title -->
  <text x="200" y="38" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-weight="800" font-size="22" fill="#f4f4f5" letter-spacing="1">GIYU AI</text>
  <text x="200" y="280" text-anchor="middle" font-family="Space Grotesk, monospace" font-size="10" fill="#c17f4e" letter-spacing="3">// WATER_HASHIRA_CHATBOT</text>

  <!-- Corner brackets -->
  <g stroke="#c17f4e" stroke-width="1.5" opacity="0.4">
    <line x1="16" y1="16" x2="36" y2="16"/><line x1="16" y1="16" x2="16" y2="36"/>
    <line x1="384" y1="16" x2="364" y2="16"/><line x1="384" y1="16" x2="384" y2="36"/>
    <line x1="16" y1="284" x2="36" y2="284"/><line x1="16" y1="284" x2="16" y2="264"/>
    <line x1="384" y1="284" x2="364" y2="284"/><line x1="384" y1="284" x2="384" y2="264"/>
  </g>
</svg>